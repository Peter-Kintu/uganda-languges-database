# Apache Security Headers and HTTP Method Restrictions for africanaai.info
# This file can be included in your Apache virtual host configuration
# Or adapted as .htaccess rules for shared hosting environments

# ============================================================================
# 1. ENABLE REQUIRED APACHE MODULES (run these commands on server)
# ============================================================================
# sudo a2enmod rewrite
# sudo a2enmod headers
# sudo a2enmod ssl
# sudo systemctl restart apache2

# ============================================================================
# 2. RESTRICT HTTP METHODS (Block PUT, DELETE, TRACE, CONNECT)
# ============================================================================
<IfModule mod_rewrite.c>
    RewriteEngine On
    
    # Block dangerous HTTP methods
    RewriteCond %{REQUEST_METHOD} ^(PUT|DELETE|TRACE|CONNECT)$
    RewriteRule .* - [F]
</IfModule>

# Alternative method using Limit directives
<LimitExcept GET POST HEAD OPTIONS>
    Deny from all
</LimitExcept>

# ============================================================================
# 3. ENFORCE STRONG SECURITY HEADERS
# ============================================================================
<IfModule mod_headers.c>
    # Always set headers (applies to all responses)
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "no-referrer-when-downgrade"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()"
    Header always set X-XSS-Protection "1; mode=block"
    
    # HSTS - Enforce HTTPS for 1 year including subdomains
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    
    # Content Security Policy - Restrict script sources to prevent XSS
    # Adjust trusted sources according to your application's needs
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://api.cloudinary.com https://res.cloudinary.com https://wa.me; media-src 'self' https:; frame-src 'self' https://www.youtube.com https://youtube.com"
</IfModule>

# ============================================================================
# 4. HARDEN TLS/SSL CONFIGURATION
# ============================================================================
# (These go in the <VirtualHost *:443> section or apache2-ssl.conf)

# Disable weak TLS versions - only allow TLS 1.2 and 1.3
SSLProtocol all -SSLv2 -SSLv3 -TLSv1 -TLSv1_1

# Use only strong cipher suites with perfect forward secrecy (ECDHE)
SSLCipherSuite 'EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH'

# Prioritize server's cipher suite selection
SSLHonorCipherOrder on

# Enable session caching for performance
SSLSessionCache shared:SSL:10m
SSLSessionTimeout 10m

# OCSP Stapling for better TLS handshake performance
SSLUseStapling on
SSLStaplingCache "shmcb:logs/stapling-cache(150000)"

# ============================================================================
# 5. ADDITIONAL HARDENING
# ============================================================================

# Disable directory listing
<Directory /var/www/html>
    Options -Indexes
</Directory>

# Hide server signature
ServerTokens Prod
ServerSignature Off

# Prevent access to sensitive files
<FilesMatch "\.(env|git|gitignore|htaccess|htpasswd|ini|conf|cfg|sql|bak|backup)$">
    Deny from all
</FilesMatch>

# Set proper MIME types
<IfModule mod_mime.c>
    # JavaScript
    AddType application/javascript .js
    
    # CSS
    AddType text/css .css
    
    # Fonts
    AddType font/woff2 .woff2
    AddType font/woff .woff
    AddType application/x-font-ttf .ttf
</IfModule>

# Enable compression for better performance
<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/json
</IfModule>

# ============================================================================
# 6. PRODUCTION VIRTUAL HOST TEMPLATE
# ============================================================================
# Add this to /etc/apache2/sites-available/africanaai-info-ssl.conf
# Or modify your existing configuration

<VirtualHost *:443>
    ServerName africanaai.info
    ServerAlias www.africanaai.info
    ServerAdmin admin@africanaai.info
    
    # SSL Certificate paths (Let's Encrypt example)
    SSLCertificateFile /etc/letsencrypt/live/africanaai.info/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/africanaai.info/privkey.pem
    
    # SSL Configuration (see section 4 above)
    SSLProtocol all -SSLv2 -SSLv3 -TLSv1 -TLSv1_1
    SSLCipherSuite 'EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH'
    SSLHonorCipherOrder on
    
    # Django proxy settings
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/
    
    # Document root
    DocumentRoot /var/www/html
    
    # Logs
    ErrorLog ${APACHE_LOG_DIR}/africanaai-error.log
    CustomLog ${APACHE_LOG_DIR}/africanaai-access.log combined
    
    # Include security headers (reference this file above)
    Include /etc/apache2/conf-available/security-headers.conf
</VirtualHost>

# ============================================================================
# 7. HTTP TO HTTPS REDIRECT
# ============================================================================
# /etc/apache2/sites-available/africanaai-info.conf

<VirtualHost *:80>
    ServerName africanaai.info
    ServerAlias www.africanaai.info
    
    # Redirect all HTTP traffic to HTTPS
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

# ============================================================================
# DEPLOYMENT INSTRUCTIONS
# ============================================================================
# 1. Save the security headers section to a separate file:
#    sudo nano /etc/apache2/conf-available/security-headers.conf
#
# 2. Enable the configuration:
