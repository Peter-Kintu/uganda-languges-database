#    sudo a2enmod rewrite
#    sudo a2enmod headers
#    sudo a2enmod ssl
#
# 4. Check Apache syntax:
#    sudo apache2ctl configtest
#    (Should output "Syntax OK")
#
# 5. Restart Apache:
#    sudo systemctl restart apache2
#
# 6. Verify headers are being sent:
#    curl -I https://africanaai.info
#    (Should show security headers in response)
#
# 7. Test TLS configuration:
#    sudo openssl s_client -connect africanaai.info:443 -tls1_2
#    (Should succeed)
#    sudo openssl s_client -connect africanaai.info:443 -tls1
#    (Should FAIL - TLS 1.0 disabled)
#
# 8. Scan with SSL Labs:
#    Visit https://www.ssllabs.com/ssltest/analyze.html?d=africanaai.info
#    (Should show A+ rating)
