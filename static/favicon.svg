<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Africana AI logo">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- round badge background -->
  <rect width="64" height="64" rx="12" fill="url(#g)" />

  <!-- stylized 'A' monogram: two strokes and connecting node to evoke AI + community -->
  <g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round" stroke-width="3">
    <path d="M20 44 L32 18 L44 44" />
    <path d="M26 34 L38 34" />
  </g>

  <!-- small connection dots to suggest network / marketplace -->
  <circle cx="18" cy="18" r="2" fill="#fff" opacity="0.85" />
  <circle cx="46" cy="18" r="2" fill="#fff" opacity="0.85" />
  <circle cx="32" cy="50" r="2" fill="#fff" opacity="0.85" />

  <!-- subtle inner glow -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#ffffff" stroke-opacity="0.06" />
  
  <!-- text alternative kept small for accessibility but hidden visually -->
  <title>Africana AI</title>
</svg>