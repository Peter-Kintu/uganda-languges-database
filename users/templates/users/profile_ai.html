{% extends "base.html" %}

{% block title %}Africana AI - Career Companion{% endblock %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>

<style>
    :root {
        --bg-main: #ffffff;
        --bg-sidebar: #f5f7fb;
        --accent-green: #16a34a;
        --accent-green-dark: #15803d;
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --glass-border: rgba(15, 23, 42, 0.08);
        --user-bg: #d1fae5;
        --ai-bg: #e2e8f0;
    }

    /* --- FORCE PARENT SANITIZATION (Bypasses base.html constraints) --- */
    html, body {
        height: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow: hidden !important;
    }

    /* Neutralize Django base.html layout blocks completely */
    #content, .content, .container, main, section, .wrapper, .content-wrapper {
        max-width: 100% !important;
        width: 100% !important;
        height: 100% !important;
        padding: 0 !important;
        margin: 0 !important;
        position: static !important;
    }

    /* --- MASTER APPLICTION BREAKPOINT ENGINE --- */
    .app-container {
        display: flex;
        position: fixed;
        /* Pull layout up cleanly to align beneath standard top-navigation elements */
        top: 56px; 
        left: 0;
        right: 0;
        bottom: 0;
        height: calc(100% - 56px);
        width: 100vw;
        overflow: hidden;
        background-color: var(--bg-main);
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        box-sizing: border-box;
        z-index: 999; /* Ensure interface draws clearly over hidden global blocks */
    }

    /* If your layout uses a secondary navbar structure height modification */
    body:not(:has(nav)):not(:has(header)) .app-container {
        top: 0 !important;
        height: 100% !important;
    }

    /* --- SIDEBAR WORKSPACE ASSEMBLY --- */
    .sidebar-history {
        width: 280px;
        height: 100%;
        background-color: var(--bg-sidebar);
        border-right: 1px solid var(--glass-border);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 40;
    }

    .sidebar-header {
        padding: 1.25rem;
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .new-chat-btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        background-color: var(--accent-green);
        color: white;
        border: none;
        padding: 0.75rem 1rem;
        border-radius: 12px;
        font-weight: 500;
        font-size: 0.9rem;
        cursor: pointer;
        transition: background-color 0.2s ease;
    }

    .new-chat-btn:hover {
        background-color: var(--accent-green-dark);
    }

    .history-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 0.75rem;
    }

    .history-item {
        padding: 0.75rem 1rem;
        border-radius: 10px;
        color: var(--text-secondary);
        font-size: 0.875rem;
        cursor: pointer;
        margin-bottom: 0.25rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        transition: all 0.2s ease;
    }

    .history-item:hover {
        background-color: rgba(15, 23, 42, 0.04);
        color: var(--text-primary);
    }

    .history-item.active {
        background-color: rgba(22, 163, 74, 0.1);
        color: var(--accent-green);
        font-weight: 500;
    }

    .sidebar-footer {
        padding: 1rem;
        border-top: 1px solid var(--glass-border);
    }

    .clear-history-btn {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        background: transparent;
        border: 1px solid var(--glass-border);
        color: #ef4444;
        padding: 0.625rem;
        border-radius: 10px;
        font-size: 0.85rem;
        cursor: pointer;
        transition: background-color 0.2s ease;
    }

    .clear-history-btn:hover {
        background-color: rgba(239, 68, 68, 0.05);
    }

    /* --- CHAT LOG ARCHITECTURE --- */
    .chat-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        height: 100%;
        min-width: 0;
        position: relative;
        background-color: var(--bg-main);
    }

    .chat-top-bar {
        height: 60px;
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        padding: 0 1.25rem;
        gap: 1rem;
        background-color: var(--bg-main);
        flex-shrink: 0;
    }

    .menu-toggle-btn {
        display: none;
        background: transparent;
        border: none;
        color: var(--text-primary);
        cursor: pointer;
        padding: 0.25rem;
    }

    /* Scroll Engine context layer */
    .chat-log-container {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem 1.25rem;
        background-color: var(--bg-main);
    }

    .chat-inner-stream {
        max-width: 800px;
        width: 100%;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
    }

    .message-wrapper {
        display: flex;
        width: 100%;
    }

    .message-wrapper.user {
        justify-content: flex-end;
    }

    .message-wrapper.ai {
        justify-content: flex-start;
    }

    .message-bubble {
        max-width: 78%;
        padding: 0.875rem 1.25rem;
        border-radius: 1.25rem;
        font-size: 0.95rem;
        line-height: 1.5;
        word-wrap: break-word;
    }

    .message-wrapper.user .message-bubble {
        background-color: var(--user-bg);
        color: var(--text-primary);
        border-bottom-right-radius: 4px;
    }

    .message-wrapper.ai .message-bubble {
        background-color: var(--ai-bg);
        color: var(--text-primary);
        border-bottom-left-radius: 4px;
    }

    .message-bubble p {
        margin: 0 0 0.75rem 0;
    }
    .message-bubble p:last-child {
        margin-bottom: 0;
    }

    .loading-message .message-bubble {
        background-color: rgba(226, 232, 240, 0.95);
        border-color: rgba(15, 23, 42, 0.08);
        color: var(--text-primary);
        opacity: 1;
    }

    .loading-dots {
        display: inline-flex;
        gap: 0.35rem;
        align-items: center;
        margin-left: 0.25rem;
    }

    .loading-dot {
        width: 8px;
        height: 8px;
        background-color: var(--accent-green);
        border-radius: 50%;
        opacity: 0.35;
        animation: pulse 1s infinite ease-in-out;
    }

    .loading-dot:nth-child(2) {
        animation-delay: 0.15s;
    }

    .loading-dot:nth-child(3) {
        animation-delay: 0.3s;
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.35; }
        50% { transform: scale(1.5); opacity: 1; }
    }

    /* --- CRITICAL BOUNDED INPUT PANEL --- */
    .chat-input-area {
        padding: 14px 16px env(safe-area-inset-bottom, 14px);
        background: var(--bg-main);
        border-top: 1px solid var(--glass-border);
        width: 100%;
        box-sizing: border-box;
        flex-shrink: 0;
    }

    .input-glass-wrapper {
        display: flex !important;
        align-items: flex-end !important;
        gap: 8px !important;
        background: var(--bg-sidebar);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 8px 14px;
        max-width: 800px;
        margin: 0 auto;
        width: 100%;
        box-sizing: border-box;
    }

    #chatInput {
        flex: 1 !important;
        width: auto !important;
        min-width: 0 !important;
        background: transparent !important;
        border: none !important;
        outline: none !important;
        resize: none !important;
        color: var(--text-primary) !important;
        font-size: 15px !important;
        line-height: 22px !important;
        padding: 6px 0 !important;
        font-family: inherit !important;
        max-height: 140px !important;
        box-sizing: border-box !important;
    }

    .btn-send {
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        flex-shrink: 0 !important;
        width: 36px !important;
        height: 36px !important;
        border-radius: 50% !important;
        background-color: var(--accent-green) !important;
        color: #ffffff !important;
        border: none !important;
        cursor: pointer !important;
        padding: 0 !important;
        margin: 0 0 1px 0 !important;
        transition: background-color 0.2s ease;
    }

    .btn-send:hover {
        background-color: var(--accent-green-dark) !important;
    }

    .sidebar-overlay {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(15, 23, 42, 0.4);
        backdrop-filter: blur(2px);
        z-index: 35;
    }

    /* --- SCREEN SIZE RESPONSIVE BREAKPOINTS --- */
    @media (max-width: 768px) {
        .app-container {
            top: 0 !important;
            height: 100% !important;
        }

        .menu-toggle-btn {
            display: block;
        }

        .sidebar-history {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            transform: translateX(-100%);
        }

        .sidebar-history.open {
            transform: translateX(0);
        }

        .sidebar-history.open + .sidebar-overlay {
            display: block;
        }

        .message-bubble {
            max-width: 85%;
        }
    }
</style>

<div class="app-container">
    <div class="sidebar-history" id="sidebarMenu">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="createNewChat()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                New Chat
            </button>
        </div>
        <div class="history-scroll" id="historyList"></div>
        <div class="sidebar-footer">
            <button class="clear-history-btn" onclick="clearChat()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                Clear Conversations
            </button>
        </div>
    </div>

    <div class="sidebar-overlay" id="menuOverlay" onclick="toggleMobileMenu()"></div>

    <div class="chat-main">
        <div class="chat-top-bar">
            <button class="menu-toggle-btn" onclick="toggleMobileMenu()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <div style="font-weight: 600; color: var(--text-primary);" id="chatTitle">Africana AI - Career & Business</div>
        </div>

        <div class="chat-log-container">
            <div class="chat-inner-stream" id="chatLog"></div>
        </div>

        <div class="chat-input-area">
            <div class="input-glass-wrapper">
                <textarea id="chatInput" placeholder="Message your career AI..." rows="1"></textarea>
                <button type="button" onclick="typeQuery()" id="sendChatButton" class="btn-send">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const chatLog = document.getElementById('chatLog');
    const chatInput = document.getElementById('chatInput');
    const sidebarMenu = document.getElementById('sidebarMenu');
    const overlay = document.getElementById('menuOverlay');

    let currentSessionId = '';
    const WELCOME_MESSAGE = "Hello! I am Africana AI, your intelligent career and business companion. I'm here to help with job strategies, career advancement, business planning, entrepreneurship, and professional development. What can I assist you with today?";

    if (window.marked) {
        const customRenderer = new marked.Renderer();
        customRenderer.table = function(header, body) {
            let resultText = '<div class="table-to-paragraph-view" style="margin: 0.5rem 0; padding: 0.25rem 0;">';
            let cleanHeaders = header.replace(/<[^>]*>/g, '|').split('|').map(s => s.trim()).filter(Boolean);
            let cleanRows = body.replace(/<\/tr>/g, '---').replace(/<[^>]*>/g, '|').split('---');

            cleanRows.forEach(row => {
                let columns = row.split('|').map(s => s.trim()).filter(Boolean);
                if (columns.length > 0) {
                    resultText += '<div style="margin-bottom: 0.75rem; background: rgba(0,0,0,0.02); padding: 8px; border-radius: 8px;">';
                    columns.forEach((col, idx) => {
                        let label = cleanHeaders[idx] ? `<strong>${cleanHeaders[idx]}:</strong> ` : '';
                        resultText += `<div style="font-size: 0.9rem; line-height: 1.4;">${label}${col}</div>`;
                    });
                    resultText += '</div>';
                }
            });
            resultText += '</div>';
            return resultText;
        };
        marked.setOptions({ renderer: customRenderer });
    }

    function toggleMobileMenu() {
        sidebarMenu.classList.toggle('open');
    }

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    function getChatSessions() {
        try {
            return JSON.parse(localStorage.getItem('chat_sessions')) || {};
        } catch(e) {
            return {};
        }
    }

    function saveMessage(sessionId, role, text) {
        const sessions = getChatSessions();
        if (!sessions[sessionId]) sessions[sessionId] = [];
        sessions[sessionId].push({ role, text, timestamp: Date.now() });
        localStorage.setItem('chat_sessions', JSON.stringify(sessions));
    }

    function getSessionHistory(sessionId) {
        return getChatSessions()[sessionId] || [];
    }

    function appendMessage(role, text) {
        const wrapper = document.createElement('div');
        wrapper.className = `message-wrapper ${role === 'user' ? 'user' : 'ai'}`;
        
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        
        if (role === 'user') {
            bubble.innerText = text;
        } else {
            try {
                bubble.innerHTML = marked.parse(text);
            } catch(e) {
                bubble.innerText = text;
            }
        }
        
        wrapper.appendChild(bubble);
        chatLog.appendChild(wrapper);
        scrollToBottom();
    }

    function appendLoadingMessage() {
        removeLoadingMessage();
        const wrapper = document.createElement('div');
        wrapper.id = 'loadingMessage';
        wrapper.className = 'message-wrapper ai loading-message';

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.innerHTML = `
            <span style="font-weight: 600;">Africana AI is thinking</span>
            <span class="loading-dots">
                <span class="loading-dot"></span>
                <span class="loading-dot"></span>
                <span class="loading-dot"></span>
            </span>
        `;

        wrapper.appendChild(bubble);
        chatLog.appendChild(wrapper);
        scrollToBottom();
    }

    function removeLoadingMessage() {
        const existing = document.getElementById('loadingMessage');
        if (existing) {
            existing.remove();
        }
    }

    function scrollToBottom() {
        const container = document.querySelector('.chat-log-container');
        if (container) {
            container.scrollTop = container.scrollHeight;
        }
    }

    // Auto-detect language from user input
    function detectLanguage(text) {
        const swahiliKeywords = ['mimi', 'unajua', 'karibu', 'shukrani', 'leo', 'nini', 'lakini', 'tunaweza'];
        const lugandaKeywords = ['nze', 'okukuba', 'omugenyi', 'webale', 'leero', 'ki', 'naye', 'tusobola'];
        const yorubaKeywords = ['mo', 'lo', 'se', 'e', 'nko', 'wa', 'soso'];
        
        const lowerText = text.toLowerCase();
        const swahiliScore = swahiliKeywords.filter(kw => lowerText.includes(kw)).length;
        const lugandaScore = lugandaKeywords.filter(kw => lowerText.includes(kw)).length;
        const yorubaScore = yorubaKeywords.filter(kw => lowerText.includes(kw)).length;

        if (swahiliScore > lugandaScore && swahiliScore > yorubaScore && swahiliScore > 0) return 'sw';
        if (lugandaScore > swahiliScore && lugandaScore > yorubaScore && lugandaScore > 0) return 'lg';
        if (yorubaScore > 0) return 'yo';
        return 'en';
    }

    async function typeQuery() {
        const text = chatInput.value.trim();
        if (!text || !currentSessionId) return;

        appendMessage('user', text);
        saveMessage(currentSessionId, 'user', text);
        chatInput.value = '';
        chatInput.style.height = 'auto';
        appendLoadingMessage();

        updateHistorySidebar();

        const detectedLang = detectLanguage(text);

        try {
            const response = await fetch('/api/v1/cerebras_proxy/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({
                    contents: getSessionHistory(currentSessionId).map(m => ({
                        role: m.role === 'user' ? 'user' : 'assistant',
                        text: m.text
                    })),
                    preferred_api: 'cerebras',
                    language: detectedLang
                })
            });

            const data = await response.json();
            const reply = data.text || data.reply || data.response || data.choices?.[0]?.message?.content;
            
            removeLoadingMessage();
            
            if (reply) {
                // Check if user asked for PDF export
                if (text.toLowerCase().includes('resume') || text.toLowerCase().includes('cv') || text.toLowerCase().includes('export')) {
                    appendMessage('ai', reply);
                    appendMessage('ai', '📄 **Would you like me to export this as a PDF Resume?** You can say "export as resume" and I\'ll generate it for you.');
                } else if (text.toLowerCase().includes('business plan') || text.toLowerCase().includes('plan') || text.toLowerCase().includes('startup')) {
                    appendMessage('ai', reply);
                    appendMessage('ai', '📋 **Would you like me to export this as a Business Plan PDF?** Just say "export as plan" and I\'ll create it.');
                } else if (text.toLowerCase().includes('export as resume') || text.toLowerCase().includes('download resume')) {
                    exportToPDF(reply, 'resume');
                    appendMessage('ai', '✅ Your **Resume PDF** is being generated and will download shortly.');
                } else if (text.toLowerCase().includes('export as plan') || text.toLowerCase().includes('download plan')) {
                    exportToPDF(reply, 'business_plan');
                    appendMessage('ai', '✅ Your **Business Plan PDF** is being generated and will download shortly.');
                } else {
                    appendMessage('ai', reply);
                }
                saveMessage(currentSessionId, 'ai', reply);
            } else {
                appendMessage('ai', data.error || "I'm experiencing a technical issue. Please try again.");
            }
        } catch(err) {
            console.error(err);
            removeLoadingMessage();
            appendMessage('ai', "I apologize, the service encountered an issue. Please try your question again.");
        }
    }

    function exportToPDF(content, docType) {
        fetch('/api/v1/generate_document_pdf/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({ text: content, doc_type: docType })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success && data.redirect_url) {
                window.open(data.redirect_url + '?download=1', '_blank');
            }
        })
        .catch(err => console.error(err));
    }

    function updateHistorySidebar() {
        const sessions = getChatSessions();
        const container = document.getElementById('historyList');
        container.innerHTML = '';
        
        Object.keys(sessions).reverse().forEach(id => {
            const item = document.createElement('div');
            item.className = `history-item ${id === currentSessionId ? 'active' : ''}`;
            
            const userMsgs = sessions[id].filter(m => m.role === 'user');
            item.innerText = userMsgs.length > 0 ? userMsgs[0].text.substring(0, 30) + '...' : "New Chat";
            
            item.onclick = () => {
                switchSession(id);
                if(sidebarMenu.classList.contains('open')) {
                    toggleMobileMenu();
                }
            };
            container.appendChild(item);
        });
    }

    function switchSession(id) {
        currentSessionId = id;
        localStorage.setItem('lastSessionId', id);
        chatLog.innerHTML = '';
        
        const history = getSessionHistory(id);
        if (history.length === 0) {
            appendMessage('ai', WELCOME_MESSAGE);
            saveMessage(id, 'ai', WELCOME_MESSAGE);
        } else {
            history.forEach(m => appendMessage(m.role, m.text));
        }
        updateHistorySidebar();
        scrollToBottom();
    }

    function createNewChat() {
        const newSessionId = 'sess_' + Date.now();
        switchSession(newSessionId);
    }

    function clearChat() {
        if(confirm("Are you sure you want to erase all chat history? This cannot be undone.")) {
            localStorage.removeItem('chat_sessions');
            localStorage.removeItem('lastSessionId');
            createNewChat();
        }
    }

    chatInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    });

    chatInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            typeQuery();
        }
    });

    document.addEventListener('DOMContentLoaded', () => {
        const lastSession = localStorage.getItem('lastSessionId');
        const sessions = getChatSessions();
        
        if (lastSession && sessions[lastSession]) {
            switchSession(lastSession);
        } else {
            createNewChat();
        }
    });
</script>
{% endblock %}
