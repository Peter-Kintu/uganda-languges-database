{% extends "base.html" %}

{% block title %}Africana AI - Career Companion{% endblock %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-main: #020617;
        --bg-sidebar: #0f172a;
        --accent-blue: #3b82f6;
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --glass-border: rgba(255, 255, 255, 0.1);
    }

    body {
        background-color: var(--bg-main);
        font-family: 'Plus Jakarta Sans', sans-serif;
        color: var(--text-primary);
        margin: 0;
        height: 100vh;
        overflow: hidden; /* Prevent body scroll */
    }

    .app-container {
        display: flex;
        height: calc(100vh - 64px); /* Adjusting for standard navbar height if exists */
        width: 100vw;
        position: relative;
    }

    /* Sidebar - Mobile Responsive Overhaul */
    .sidebar {
        width: 280px;
        background: var(--bg-sidebar);
        border-right: 1px solid var(--glass-border);
        display: flex;
        flex-direction: column;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 100;
    }

    /* Main Content Area Layout */
    .chat-main-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: radial-gradient(circle at top right, #0f172a, #020617);
        position: relative;
        height: 100%;
        overflow: hidden;
    }

    .chat-header {
        flex-shrink: 0;
        padding: 1rem 1.5rem;
        background: rgba(2, 6, 23, 0.85);
        backdrop-filter: blur(15px);
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    /* Scrollable Message Zone */
    #chatLog {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem 1rem 2rem;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
        scroll-behavior: smooth;
    }

    @media (min-width: 1024px) {
        #chatLog { padding: 2rem 20% 4rem; }
    }

    /* Better Message Bubbles */
    .chat-message {
        max-width: 90%;
        padding: 1rem 1.25rem;
        border-radius: 18px;
        font-size: 0.95rem;
        line-height: 1.6;
        word-wrap: break-word;
    }

    .chat-message.user {
        align-self: flex-end;
        background: var(--accent-blue);
        color: white;
        border-bottom-right-radius: 4px;
        box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2);
    }

    .chat-message.ai {
        align-self: flex-start;
        background: #1e293b;
        color: #f1f5f9;
        border-bottom-left-radius: 4px;
        border: 1px solid var(--glass-border);
    }

    /* Sticky Input Area */
    .chat-input-area {
        flex-shrink: 0;
        padding: 1rem;
        background: linear-gradient(to top, var(--bg-main) 80%, transparent);
    }

    @media (min-width: 1024px) {
        .chat-input-area { padding: 0 20% 2rem; }
    }

    .input-glass-wrapper {
        display: flex;
        align-items: center;
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        padding: 0.5rem 0.75rem;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    textarea {
        flex: 1;
        background: transparent;
        border: none;
        color: white;
        outline: none;
        resize: none;
        padding: 0.5rem;
        font-size: 1rem;
        max-height: 120px;
    }

    /* Mobile Logic */
    @media (max-width: 768px) {
        .sidebar {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            transform: translateX(-100%);
        }
        .sidebar.active {
            transform: translateX(0);
            box-shadow: 20px 0 50px rgba(0,0,0,0.5);
        }
        .sidebar-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 90;
            backdrop-filter: blur(2px);
        }
        .sidebar-overlay.active { display: block; }
    }

    .btn-send {
        background: var(--accent-blue);
        color: white;
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.2s;
    }

    #typingStatus {
        position: absolute;
        bottom: 90px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.7rem;
        color: var(--accent-blue);
        background: rgba(15, 23, 42, 0.8);
        padding: 4px 12px;
        border-radius: 20px;
        display: none;
        z-index: 10;
    }
</style>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="p-5 flex justify-between items-center border-b border-white/5">
            <h2 class="text-[10px] font-black uppercase text-slate-500 tracking-widest">Chat History</h2>
            <button onclick="createNewChat()" class="p-2 hover:bg-white/5 rounded-lg text-slate-400">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
            </button>
        </div>
        <ul class="history-list mt-2" id="historyList"></ul>
        <div class="p-4 mt-auto border-t border-white/5">
            <button onclick="clearChat()" class="w-full py-3 text-[10px] font-bold text-red-400 hover:bg-red-400/10 rounded-xl transition uppercase">Clear History</button>
        </div>
    </aside>

    <main class="chat-main-area">
        <header class="chat-header">
            <div class="flex items-center gap-3">
                <button id="sidebarToggle" class="p-2 -ml-2 text-slate-400 hover:text-white transition">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <div>
                    <h1 class="text-sm font-bold text-slate-100">Career Companion</h1>
                    <p class="text-[9px] text-slate-500 font-medium">Africana AI Engine</p>
                </div>
            </div>
            <div class="hidden sm:flex items-center gap-2 px-3 py-1 bg-emerald-500/10 rounded-full border border-emerald-500/20">
                <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                <span class="text-[9px] font-bold text-emerald-500 uppercase">Live</span>
            </div>
        </header>

        <div id="chatLog"></div>
        
        <div id="typingStatus">
            <span class="animate-pulse">Thinking...</span>
        </div>

        <div class="chat-input-area">
            <div class="input-glass-wrapper">
                <textarea id="chatInput" placeholder="Message Africana AI..." rows="1"></textarea>
                <button onclick="typeQuery()" id="sendChatButton" class="btn-send">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
            </div>
        </div>
    </main>
</div>

<script>
    let currentSessionId = localStorage.getItem('lastSessionId') || 'sess_' + Date.now();
    const chatInput = document.getElementById('chatInput');
    const chatLog = document.getElementById('chatLog');
    const typingStatus = document.getElementById('typingStatus');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');

    window.onload = () => {
        updateHistorySidebar();
        switchSession(currentSessionId);
    };

    // Auto-expand textarea
    chatInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    });

    // Mobile Sidebar Toggle
    document.getElementById('sidebarToggle').onclick = () => {
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
    };

    overlay.onclick = () => {
        sidebar.classList.remove('active');
        overlay.classList.remove('active');
    };

    async function typeQuery() {
        const text = chatInput.value.trim();
        if (!text) return;

        const sendBtn = document.getElementById('sendChatButton');
        sendBtn.disabled = true;
        
        appendMessage('user', text);
        chatInput.value = '';
        chatInput.style.height = 'auto';
        typingStatus.style.display = 'block';
        scrollToBottom();

        try {
            const history = getSessionHistory(currentSessionId);
            const contents = history.map(m => ({ role: m.role, text: m.text }));
            contents.push({ role: 'user', text: text });

            const response = await fetch("{% url 'users:gemini_proxy' %}", {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify({ contents: contents })
            });

            const data = await response.json();
            typingStatus.style.display = 'none';

            if (data.text) {
                appendMessage('ai', data.text);
                saveMessage(currentSessionId, 'user', text);
                saveMessage(currentSessionId, 'ai', data.text);
                updateHistorySidebar();
            }
        } catch (e) {
            typingStatus.style.display = 'none';
            appendMessage('ai', "Error: Check connection.");
        } finally {
            sendBtn.disabled = false;
            scrollToBottom();
        }
    }

    function appendMessage(role, text) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `chat-message ${role}`;
        
        let formatted = text
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/^\s*[\-\*]\s+(.*)/gm, '<li>$1</li>')
            .replace(/\n/g, '<br>');

        messageDiv.innerHTML = `
            <span class="text-[10px] font-bold uppercase opacity-40 block mb-1">${role === 'user' ? 'You' : 'Africana AI'}</span>
            <div class="message-content">${formatted}</div>
        `;
        chatLog.appendChild(messageDiv);
        scrollToBottom();
    }

    function scrollToBottom() {
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    function getSessionHistory(id) {
        const sessions = JSON.parse(localStorage.getItem('chat_sessions') || '{}');
        return sessions[id] || [];
    }

    function saveMessage(id, role, text) {
        const sessions = JSON.parse(localStorage.getItem('chat_sessions') || '{}');
        if (!sessions[id]) sessions[id] = [];
        sessions[id].push({ role, text });
        localStorage.setItem('chat_sessions', JSON.stringify(sessions));
    }

    function updateHistorySidebar() {
        const sessions = JSON.parse(localStorage.getItem('chat_sessions') || '{}');
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        Object.keys(sessions).reverse().forEach(id => {
            const li = document.createElement('li');
            li.className = `history-item ${id === currentSessionId ? 'active' : ''}`;
            li.innerText = sessions[id][0]?.text.substring(0, 30) + '...' || 'New Chat';
            li.onclick = () => {
                switchSession(id);
                if (window.innerWidth < 768) {
                    sidebar.classList.remove('active');
                    overlay.classList.remove('active');
                }
            };
            list.appendChild(li);
        });
    }

    function switchSession(id) {
        currentSessionId = id;
        localStorage.setItem('lastSessionId', id);
        chatLog.innerHTML = '';
        const history = getSessionHistory(id);
        if (history.length === 0) {
            appendMessage('ai', "Ready to boost your career. How can I help?");
        } else {
            history.forEach(m => appendMessage(m.role, m.text));
        }
        updateHistorySidebar();
    }

    function createNewChat() {
        const newId = 'sess_' + Date.now();
        switchSession(newId);
    }

    function clearChat() {
        if(confirm("Clear history?")) {
            localStorage.clear();
            location.reload();
        }
    }

    chatInput.onkeydown = (e) => {
        if(e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            typeQuery();
        }
    };
</script>
{% endblock %}
