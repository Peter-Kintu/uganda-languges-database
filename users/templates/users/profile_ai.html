{% extends "base.html" %}

{% block title %}Africana AI - Career Companion{% endblock %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-main: #020617;
        --bg-sidebar: #0f172a;
        --accent-blue: #3b82f6;
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --glass-border: rgba(255, 255, 255, 0.08);
    }

    body {
        background-color: var(--bg-main);
        font-family: 'Plus Jakarta Sans', sans-serif;
        color: var(--text-primary);
        margin: 0;
        height: 100vh;
        overflow: hidden;
    }

    /* --- MODERN SCROLLBAR --- */
    #chatLog::-webkit-scrollbar { width: 4px; }
    #chatLog::-webkit-scrollbar-track { background: transparent; }
    #chatLog::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    #chatLog::-webkit-scrollbar-thumb:hover { background: var(--accent-blue); }

    .app-container { display: flex; height: 100vh; width: 100vw; }

    /* --- SIDEBAR --- */
    .sidebar {
        width: 280px;
        background: var(--bg-sidebar);
        border-right: 1px solid var(--glass-border);
        display: flex;
        flex-direction: column;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 50;
    }

    .sidebar.collapsed { width: 0; opacity: 0; pointer-events: none; }

    .history-list { flex: 1; overflow-y: auto; padding: 1rem; list-style: none; margin: 0; }
    .history-item {
        padding: 0.75rem 1rem;
        margin-bottom: 0.5rem;
        border-radius: 10px;
        font-size: 0.85rem;
        cursor: pointer;
        color: var(--text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        transition: 0.2s;
    }
    .history-item:hover { background: rgba(255,255,255,0.05); color: white; }
    .history-item.active { background: rgba(59, 130, 246, 0.15); color: var(--accent-blue); border: 1px solid rgba(59, 130, 246, 0.3); }

    /* --- MAIN CHAT --- */
    .chat-main-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: radial-gradient(circle at top right, #0f172a, #020617);
        position: relative;
    }

    .chat-header {
        padding: 1rem 2rem;
        background: rgba(2, 6, 23, 0.7);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    #chatLog {
        flex: 1;
        overflow-y: auto;
        padding: 2rem 15%;
        display: flex;
        flex-direction: column;
        gap: 2rem;
        scroll-behavior: smooth;
    }

    /* --- MESSAGE STYLES --- */
    .chat-message {
        max-width: 85%;
        padding: 1.25rem;
        border-radius: 20px;
        font-size: 0.95rem;
        line-height: 1.6;
        animation: fadeIn 0.3s ease forwards;
        position: relative;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .chat-message.user {
        align-self: flex-end;
        background: var(--accent-blue);
        color: white;
        border-bottom-right-radius: 4px;
        box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.4);
    }

    .chat-message.ai {
        align-self: flex-start;
        background: #1e293b;
        color: #e2e8f0;
        border-bottom-left-radius: 4px;
        border: 1px solid var(--glass-border);
    }

    .message-label {
        display: block;
        font-size: 0.65rem;
        text-transform: uppercase;
        font-weight: 800;
        letter-spacing: 0.05em;
        margin-bottom: 0.5rem;
        opacity: 0.6;
    }

    /* --- INPUT AREA --- */
    .chat-input-area { padding: 2rem 15%; }
    .input-wrapper {
        display: flex;
        background: #0f172a;
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        padding: 0.75rem;
        align-items: flex-end;
        transition: 0.3s;
    }
    .input-wrapper:focus-within { border-color: var(--accent-blue); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }

    textarea {
        flex: 1;
        background: transparent;
        border: none;
        color: white;
        outline: none;
        resize: none;
        padding: 0.5rem;
        font-family: inherit;
        font-size: 0.95rem;
        max-height: 150px;
    }

    .btn-send {
        background: var(--accent-blue);
        color: white;
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.2s;
    }
    .btn-send:hover { transform: scale(1.05); }
    .btn-send:disabled { opacity: 0.5; filter: grayscale(1); }

    /* Loading state */
    .typing-indicator {
        display: none;
        padding: 1rem 15%;
        color: var(--accent-blue);
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.1em;
    }

    @media (max-width: 768px) {
        #chatLog, .chat-input-area { padding-left: 5%; padding-right: 5%; }
        .sidebar { position: fixed; left: -280px; height: 100%; }
        .sidebar.open { left: 0; width: 280px; opacity: 1; }
    }
</style>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="p-6 flex justify-between items-center">
            <h2 class="text-xs font-bold uppercase tracking-widest text-gray-500">History</h2>
            <button onclick="createNewChat()" class="text-gray-400 hover:text-white">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            </button>
        </div>
        <ul class="history-list" id="historyList"></ul>
        <div class="p-4">
            <button onclick="clearChat()" class="w-full py-2 text-[10px] text-red-500 hover:bg-red-500/10 rounded-lg uppercase font-bold tracking-tighter transition">Clear All Data</button>
        </div>
    </aside>

    <main class="chat-main-area">
        <header class="chat-header">
            <div class="flex items-center gap-4">
                <button id="sidebarToggle" class="text-gray-400 hover:text-white">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <h1 class="text-lg font-bold">Africana Career AI</h1>
            </div>
            <span class="text-[10px] font-black bg-blue-500/20 text-blue-400 px-2 py-1 rounded uppercase tracking-widest border border-blue-500/30">v2.1 Flash</span>
        </header>

        <div id="chatLog"></div>
        
        <div id="typingIndicator" class="typing-indicator">AI is analyzing...</div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <textarea id="chatInput" placeholder="How can I help your career today?" rows="1"></textarea>
                <button onclick="typeQuery()" id="sendChatButton" class="btn-send">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
        </div>
    </main>
</div>

<script>
    let currentSessionId = localStorage.getItem('lastSessionId') || 'session_' + Date.now();
    const chatInput = document.getElementById('chatInput');
    const chatLog = document.getElementById('chatLog');
    const typingIndicator = document.getElementById('typingIndicator');

    window.onload = () => {
        updateHistorySidebar();
        switchSession(currentSessionId);
        chatInput.focus();
    };

    async function typeQuery() {
        const text = chatInput.value.trim();
        if (!text) return;

        const sendBtn = document.getElementById('sendChatButton');
        sendBtn.disabled = true;

        appendMessage('user', text);
        chatInput.value = '';
        chatInput.style.height = 'auto';
        typingIndicator.style.display = 'block';
        chatLog.scrollTop = chatLog.scrollHeight;

        try {
            const history = getSessionHistory(currentSessionId);
            const response = await fetch("{% url 'users:gemini_proxy' %}", {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify({ contents: history.concat({ role: 'user', text: text }) })
            });

            const data = await response.json();

            if (data.text) {
                appendMessage('ai', data.text);
                saveMessage(currentSessionId, 'user', text);
                saveMessage(currentSessionId, 'ai', data.text);
                updateHistorySidebar();
            } else {
                appendMessage('ai', "I encountered an issue processing that. Please try again.");
            }
        } catch (e) {
            console.error(e);
            appendMessage('ai', "Connection lost. Please check your internet.");
        } finally {
            typingIndicator.style.display = 'none';
            sendBtn.disabled = false;
            // Scroll to bottom again after AI response is rendered
            setTimeout(() => { chatLog.scrollTop = chatLog.scrollHeight; }, 50);
        }
    }

    function appendMessage(role, text) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `chat-message ${role}`;
        
        const labelText = role === 'user' ? 'You' : 'Career Agent';
        
        // Safety check for empty text
        if (!text) return;

        // Better Markdown simulation
        let cleanText = text
            .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>') // Bold
            .replace(/\n/g, '<br>') // New lines
            .replace(/- (.*?)<br>/g, '• $1<br>'); // Bullets

        messageDiv.innerHTML = `
            <span class="message-label">${labelText}</span>
            <div class="message-content">${cleanText}</div>
        `;

        chatLog.appendChild(messageDiv);
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    function getSessionHistory(id) {
        const sessions = JSON.parse(localStorage.getItem('chat_sessions') || '{}');
        return sessions[id] || [];
    }

    function saveMessage(id, role, text) {
        const sessions = JSON.parse(localStorage.getItem('chat_sessions') || '{}');
        if (!sessions[id]) sessions[id] = [];
        sessions[id].push({ role, text });
        localStorage.setItem('chat_sessions', JSON.stringify(sessions));
    }

    function updateHistorySidebar() {
        const sessions = JSON.parse(localStorage.getItem('chat_sessions') || '{}');
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        Object.keys(sessions).sort().reverse().forEach(id => {
            const title = sessions[id][0]?.text.substring(0, 30) || "New Conversation";
            const li = document.createElement('li');
            li.className = `history-item ${id === currentSessionId ? 'active' : ''}`;
            li.innerHTML = title + '...';
            li.onclick = () => switchSession(id);
            list.appendChild(li);
        });
    }

    function switchSession(id) {
        currentSessionId = id;
        localStorage.setItem('lastSessionId', id);
        chatLog.innerHTML = '';
        getSessionHistory(id).forEach(msg => appendMessage(msg.role, msg.text));
        updateHistorySidebar();
    }

    function createNewChat() {
        const newId = 'session_' + Date.now();
        switchSession(newId);
    }

    function clearChat() {
        if(confirm("Delete all history?")) {
            localStorage.clear();
            location.reload();
        }
    }

    document.getElementById('sidebarToggle').onclick = () => {
        const sb = document.getElementById('sidebar');
        if(window.innerWidth <= 768) {
            sb.classList.toggle('open');
        } else {
            sb.classList.toggle('collapsed');
        }
    };

    chatInput.oninput = function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    };

    chatInput.onkeydown = (e) => {
        if(e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            typeQuery();
        }
    };
</script>
{% endblock %}
