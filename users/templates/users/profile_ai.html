{% extends "base.html" %}

{% block title %}Africana AI - Career Companion{% endblock %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<style>
    :root {
        --bg-main: #ffffff;
        --bg-sidebar: #f5f7fb;
        --accent-green: #16a34a;
        --accent-green-dark: #15803d;
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --glass-border: rgba(15, 23, 42, 0.08);
        --user-bg: #d1fae5;
        --ai-bg: #e2e8f0;
    }

    /* Prevent base.html from creating a double scrollbar */
    html, body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        background-color: var(--bg-main);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        color: var(--text-primary);
    }

    /* The container must account for the header in base.html.
       Subtracting 80px is a standard estimate for the header height.
    */
    .app-container {
        display: flex;
        width: 100vw;
        height: calc(100vh - 80px); 
        position: relative;
        overflow: hidden; 
    }

    @media (max-width: 768px) {
        .app-container {
            height: calc(100vh - 140px); /* Adjust for mobile bottom nav in base.html */
        }
    }

    @media (max-width: 480px) {
        .app-container {
            height: calc(100vh - 160px); /* Extra adjustment for very small screens */
        }
    }

    .sidebar {
        width: 280px;
        background: var(--bg-sidebar);
        border-right: 1px solid var(--glass-border);
        display: flex;
        flex-direction: column;
        transition: transform 0.3s ease;
        z-index: 100;
        height: 100%;
    }

    .chat-main-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: var(--bg-main);
        height: 100%;
        min-height: 0;
        position: relative;
    }

    .chat-header {
        flex-shrink: 0;
        padding: 0.75rem 1rem;
        background: var(--bg-sidebar);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--glass-border);
        z-index: 10;
    }

    #chatLog {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 1.5rem 1rem;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        scroll-behavior: smooth;
        min-height: 0;
        background: #ffffff;
        border-radius: 1.5rem;
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
        word-break: break-word;
    }

    #chatLog::-webkit-scrollbar { width: 6px; }
    #chatLog::-webkit-scrollbar-track { background: transparent; }
    #chatLog::-webkit-scrollbar-thumb { background: var(--accent-green); border-radius: 3px; opacity: 0.5; }

    .chat-message {
        max-width: 85%;
        padding: 0.85rem 1.1rem;
        border-radius: 1.25rem;
        font-size: 0.95rem;
        line-height: 1.5;
        animation: fadeIn 0.2s ease;
        word-wrap: break-word;
        overflow-wrap: anywhere;
        word-break: break-word;
        white-space: pre-wrap;
        position: relative;
        box-sizing: border-box;
    }

    .chat-message a {
        color: var(--accent-green);
        text-decoration: underline;
        word-break: break-word;
    }

    .message-content table {
        width: 100%;
        border-collapse: collapse;
        margin: 1rem 0;
        font-size: 0.95rem;
    }
    .message-content th,
    .message-content td {
        border: 1px solid rgba(15, 23, 42, 0.15);
        padding: 0.75rem 1rem;
        text-align: left;
    }
    .message-content th {
        background-color: rgba(22, 163, 74, 0.1);
        color: var(--text-primary);
        font-weight: 600;
    }
    .message-content p {
        margin-bottom: 0.85rem;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    .chat-message.user {
        align-self: flex-end;
        background: var(--user-bg);
        color: var(--text-primary);
        border-bottom-right-radius: 4px;
    }

    .chat-message.ai {
        align-self: flex-start;
        background: var(--ai-bg);
        color: var(--text-primary);
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-bottom-left-radius: 4px;
    }

    .chat-input-area {
        flex-shrink: 0;
        padding: 1rem;
        background: var(--bg-main);
        border-top: 1px solid var(--glass-border);
    }

    .input-glass-wrapper {
        display: flex;
        align-items: flex-end;
        background: rgba(30, 42, 47, 0.8);
        border: 1px solid var(--glass-border);
        border-radius: 1.25rem;
        padding: 0.5rem 0.75rem;
        max-width: 800px;
        margin: 0 auto;
    }

    textarea {
        flex: 1;
        background: transparent !important;
        border: none;
        color: white !important;
        caret-color: white !important;
        outline: none;
        resize: none;
        padding: 0.5rem;
        font-size: 1rem;
        max-height: 150px;
        font-family: inherit;
    }

    textarea:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .btn-send {
        background: var(--accent-green);
        color: white;
        border: none;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
        margin-bottom: 2px;
        flex-shrink: 0;
    }

    .btn-send:hover {
        background: var(--accent-green-dark);
        transform: scale(1.05);
    }

    .btn-send:active {
        transform: scale(0.95);
    }

    .btn-send:disabled {
        background: #6b7280;
        cursor: not-allowed;
        transform: none;
    }

    @media (max-width: 768px) {
        .sidebar {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            transform: translateX(-100%);
        }
        .sidebar.active { transform: translateX(0); }
        .chat-message { max-width: 92%; }
        .chat-header {
            padding: 0.5rem 0.75rem;
        }
        .chat-input-area {
            padding: 0.75rem;
        }
        .input-glass-wrapper {
            padding: 0.4rem 0.6rem;
        }
        textarea {
            font-size: 0.9rem;
            padding: 0.4rem;
        }
        .btn-send {
            width: 32px;
            height: 32px;
        }
        .btn-send svg {
            width: 16px;
            height: 16px;
        }
    }

    /* Extra small screens */
    @media (max-width: 480px) {
        .sidebar {
            width: 260px;
        }
        .chat-message {
            max-width: 95%;
            font-size: 0.9rem;
            padding: 0.7rem 0.9rem;
        }
        .chat-header {
            padding: 0.4rem 0.6rem;
        }
        .chat-header span {
            font-size: 0.85rem;
        }
        .chat-input-area {
            padding: 0.6rem;
        }
        .input-glass-wrapper {
            padding: 0.3rem 0.5rem;
        }
        textarea {
            font-size: 0.85rem;
            padding: 0.3rem;
        }
        .btn-send {
            width: 28px;
            height: 28px;
        }
        .btn-send svg {
            width: 14px;
            height: 14px;
        }
        #chatLog {
            padding: 1rem 0.75rem;
            gap: 1rem;
        }
        .history-item {
            padding: 0.6rem 0.8rem;
            margin: 0.2rem 0.5rem;
            font-size: 0.8rem;
        }
    }

    /* Large screens */
    @media (min-width: 1024px) {
        .sidebar {
            width: 320px;
        }
        .chat-main-area {
            max-width: 1200px;
            margin: 0 auto;
        }
        .chat-message {
            max-width: 75%;
        }
        .input-glass-wrapper {
            max-width: 900px;
        }
    }

    /* Medium screens */
    @media (min-width: 768px) and (max-width: 1023px) {
        .sidebar {
            width: 280px;
        }
        .chat-message {
            max-width: 80%;
        }
    }

    .history-item {
        padding: 0.75rem 1rem;
        margin: 0.25rem 0.75rem;
        border-radius: 0.75rem;
        cursor: pointer;
        font-size: 0.85rem;
        color: var(--text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        transition: all 0.2s;
    }

    .history-item:hover {
        background: rgba(37, 211, 102, 0.1);
    }

    .history-item.active {
        background: rgba(37, 211, 102, 0.2);
        color: var(--accent-green);
        font-weight: 600;
    }

    .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        z-index: 90;
        backdrop-filter: blur(2px);
    }
    .sidebar-overlay.active { display: block; }

    /* Hide the default site footer for this specific interface */
    footer { display: none !important; }
</style>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="p-5 flex justify-between items-center">
            <h2 class="text-xs font-bold uppercase text-slate-500 tracking-widest">History</h2>
            <button onclick="createNewChat()" class="text-slate-400 p-1 hover:text-white">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            </button>
        </div>
        <div id="historyList" class="flex-1 overflow-y-auto"></div>
        <div class="p-4 border-t border-white/5">
            <button onclick="clearChat()" class="text-[10px] text-red-400 uppercase font-bold w-full opacity-60 hover:opacity-100">Reset System</button>
        </div>
    </aside>

    <main class="chat-main-area">
        <header class="chat-header flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button id="sidebarToggle" class="p-1 text-slate-400">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <span class="font-bold text-sm tracking-tight">Africana AI <span style="color: var(--accent-green);">Companion</span></span>
            </div>
            <div class="flex items-center gap-2 px-2 py-1 rounded border" style="background: rgba(37, 211, 102, 0.1); border-color: var(--accent-green);">
                <div class="w-1.5 h-1.5 rounded-full animate-pulse" style="background: var(--accent-green);"></div>
                <span class="text-[8px] font-black uppercase" style="color: var(--accent-green);">Live</span>
            </div>
        </header>

        <div id="chatLog"></div>

        <div class="chat-input-area">
            <div class="input-glass-wrapper">
                <textarea id="chatInput" placeholder="Message your career AI..." rows="1"></textarea>
                <button type="button" onclick="typeQuery()" id="sendChatButton" class="btn-send">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
            </div>
        </div>
    </main>
</div>

<script>
    let currentSessionId = localStorage.getItem('lastSessionId') || 'sess_' + Date.now();
    let chatInput = null;
    let chatLog = null;
    let sidebar = null;
    let sidebarToggle = null;
    let overlay = null;
    let sendChatButton = null;
    const WELCOME_MESSAGE = "Hello! How can I assist with your career goals today?";
    const CSRF_TOKEN = getCookie('csrftoken');

    console.log('Africana AI chat script loaded.');

    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return '';
    }

    function prefersSunbirdLanguage(text) {
        const normalized = text.toLowerCase();
        const localKeywords = [
            'luganda', 'kiganda', 'ganda', 'kiswahili', 'swahili',
            'runyankole', 'runyarwanda', 'acholi', 'runyoro', 'rutooro',
            'lugbara', 'lusoga', 'lumasaaba', 'kinyarwanda', 'hausa',
            'yoruba', 'igbo', 'amharic', 'somali', 'afrikaans', 'shona',
            'xhosa', 'zulu'
        ];
        if (localKeywords.some(keyword => normalized.includes(keyword))) {
            return true;
        }
        const translationHint = /(translate|interpret|meaning|in)\s+(luganda|kiganda|ganda|kiswahili|swahili|runyankole|runyarwanda|acholi|runyoro|rutooro|lugbara|lusoga|lumasaaba|kinyarwanda|hausa|yoruba|igbo|amharic|somali|afrikaans|shona|xhosa|zulu)/i;
        return translationHint.test(text);
    }

    async function fetchChatResponse(url, body) {
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': CSRF_TOKEN
                },
                body: JSON.stringify(body)
            });
            let data = {};
            try {
                data = await response.json();
            } catch (parseErr) {
                console.error('Failed to parse AI response JSON:', parseErr);
                data = { error: 'Invalid response from the AI service.' };
            }
            return { response, data };
        } catch (networkErr) {
            console.error('Network error contacting AI service:', networkErr);
            return { response: null, data: { error: 'Connection error while contacting the AI service.' } };
        }
    }

    function initializeChatUI() {
        chatInput = document.getElementById('chatInput');
        chatLog = document.getElementById('chatLog');
        sidebar = document.getElementById('sidebar');
        sidebarToggle = document.getElementById('sidebarToggle');
        overlay = document.getElementById('sidebarOverlay');
        sendChatButton = document.getElementById('sendChatButton');

        if (!chatInput || !chatLog) {
            console.error('Chat UI initialization failed: missing chatInput and/or chatLog. Chat events will not attach.');
            return;
        }
        if (!sidebar || !sidebarToggle || !overlay) {
            console.warn('Sidebar controls are missing: UI overlay/sidebar events may not work.');
        }

        if (sidebarToggle && sidebar && overlay) {
            sidebarToggle.onclick = () => {
                sidebar.classList.add('active');
                overlay.classList.add('active');
            };
            overlay.onclick = () => {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            };
        }

        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                console.log('Enter pressed, sending chat');
                typeQuery();
            }
        });

        if (sendChatButton) {
            sendChatButton.addEventListener('click', function(e) {
                e.preventDefault();
                console.log('Send button clicked');
                typeQuery();
            });
        }

        switchSession(currentSessionId);
        updateHistorySidebar();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initializeChatUI);
    } else {
        initializeChatUI();
    }

    async function typeQuery() {
        if (!chatInput || !chatLog) {
            console.error('typeQuery called but chatInput/chatLog are not available.');
            return;
        }
        console.log('typeQuery triggered');
        const text = chatInput.value.trim();
        if (!text) return;

        // --- INTERCEPT SUNBIRD IMAGE REQUESTS ---
        const imageKeywords = ['generate image', 'create image', 'make an image', 'generate an image', 'make an advert', 'generate advert', 'create a poster', 'design a poster', 'generate a banner'];
        const wantsImage = imageKeywords.some(keyword => text.toLowerCase().includes(keyword));

        if (wantsImage) {
            // Sunbird image generation is not available in this deployment.
            // Provide a helpful fallback: craft a concise prompt the user can copy
            // and use with an external image-generation service.
            appendMessage('user', text);
            chatInput.value = '';
            chatInput.style.height = 'auto';
            scrollToBottom();

            const promptText = `Professional product marketing photograph, studio lighting, crisp clean focus, vibrant modern aesthetic tailored for African digital business: ${text}`;

            const card = document.createElement('div');
            card.className = 'chat-message ai';
            card.style.maxWidth = '640px';
            card.innerHTML = `
                <div class="text-[10px] font-bold opacity-50 mb-2 uppercase" style="color: var(--accent-green);">Image Generation Unavailable</div>
                <p class="text-sm text-slate-700 mb-2">I can't generate images from here. I prepared a ready-to-use prompt you can paste into any image generator.</p>
                <pre id="generated-prompt" style="white-space:pre-wrap;background:#f8fafc;padding:0.6rem;border-radius:0.5rem;border:1px solid rgba(15,23,42,0.04);">${escapeHtml(promptText)}</pre>
                <div style="margin-top:0.5rem; display:flex; gap:0.5rem;">
                    <button id="copyPromptBtn" class="mt-0 text-xs font-bold text-white px-3 py-1.5 rounded" style="background: var(--accent-green); border:none; cursor:pointer;">Copy Prompt</button>
                    <a id="searchGenerators" class="mt-0 text-xs font-bold text-slate-700 px-3 py-1.5 rounded border" style="background:transparent; border:1px solid rgba(15,23,42,0.06); text-decoration:none;" target="_blank">Find Generators</a>
                </div>
            `;

            chatLog.appendChild(card);
            scrollToBottom();

            document.getElementById('copyPromptBtn').onclick = () => {
                navigator.clipboard.writeText(promptText).then(() => {
                    appendMessage('ai', 'Prompt copied to clipboard. Paste it into any image generator.');
                }).catch(() => {
                    appendMessage('ai', 'Unable to copy prompt—please select and copy it manually.');
                });
            };

            const searchLink = document.getElementById('searchGenerators');
            if (searchLink) {
                // Generic search for image generators so we don't hardcode any provider.
                searchLink.href = `https://www.google.com/search?q=${encodeURIComponent('AI image generator ' + text)}`;
            }

            saveMessage(currentSessionId, 'user', text);
            saveMessage(currentSessionId, 'ai', `[Image prompt prepared]`);
            updateHistorySidebar();

            return; // Exit out of text generation pipeline
        }

        // --- EXTANT SPEEDY CEREBRAS / SUNBIRD TEXT INFERENCE ROUTING ---
        const cacheKey = `ai_cache_${text.toLowerCase().replace(/\s+/g, '_')}`;
        const cachedResponse = localStorage.getItem(cacheKey);
        if (cachedResponse) {
            appendMessage('user', text);
            chatInput.value = '';
            chatInput.style.height = 'auto';
            scrollToBottom();
            appendMessage('ai', cachedResponse);
            saveMessage(currentSessionId, 'user', text);
            saveMessage(currentSessionId, 'ai', cachedResponse);
            updateHistorySidebar();
            return;
        }

        chatInput.disabled = true;
        const sendButton = document.querySelector('.btn-send');
        if (sendButton) sendButton.disabled = true;

        appendMessage('user', text);
        chatInput.value = '';
        chatInput.style.height = 'auto';
        scrollToBottom();

        try {
            const useSunbird = prefersSunbirdLanguage(text);
            const sessionContents = [...getSessionHistory(currentSessionId), { role: 'user', text: text }];
            const primaryBody = {
                contents: sessionContents,
                preferred_api: useSunbird ? 'sunbird' : 'cerebras'
            };
            const secondaryBody = {
                contents: sessionContents,
                preferred_api: useSunbird ? 'cerebras' : 'cerebras'
            };

            let primaryResult = await fetchChatResponse("{% url 'users:cerebras_proxy' %}", primaryBody);
            let response = primaryResult.response;
            let data = primaryResult.data;

            const shouldTrySecondary = !response || !response.ok || !data.text;
            if (shouldTrySecondary) {
                console.log('Primary AI route failed; attempting fallback. Preferred API:', primaryBody.preferred_api);
                const fallbackUrl = useSunbird ? "{% url 'users:cerebras_proxy' %}" : "{% url 'users:gemini_proxy' %}";
                const fallbackBody = useSunbird ? { ...secondaryBody } : { contents: sessionContents };
                const secondaryResult = await fetchChatResponse(fallbackUrl, fallbackBody);
                if (secondaryResult.response && secondaryResult.response.ok && secondaryResult.data.text) {
                    response = secondaryResult.response;
                    data = secondaryResult.data;
                } else if (!data.text) {
                    data = data.error ? data : secondaryResult.data;
                }
            }

            if (!data.text) {
                const errorMessage = data.error || (response ? `Server error (${response.status})` : 'AI service unavailable at the moment.');
                appendMessage('ai', errorMessage);
                saveMessage(currentSessionId, 'user', text);
                saveMessage(currentSessionId, 'ai', errorMessage);
                updateHistorySidebar();
                return;
            }

            appendTypingMessage('ai', data.text);
            saveMessage(currentSessionId, 'user', text);
            saveMessage(currentSessionId, 'ai', data.text);
            updateHistorySidebar();
            localStorage.setItem(cacheKey, data.text);

            const lowerText = text.toLowerCase();
            let docType = null;
            if (lowerText.includes('resume') || lowerText.includes('cv ') || lowerText.includes('curriculum vitae')) {
                docType = 'resume';
            } else if (lowerText.includes('business plan') || lowerText.includes('company profile')) {
                docType = 'business_plan';
            }

            if (docType) {
                setTimeout(() => {
                    const exportCard = document.createElement('div');
                    exportCard.className = 'chat-message ai';
                    exportCard.style.borderLeft = '4px solid var(--accent-green)';
                    exportCard.innerHTML = `
                        <div class="text-[10px] font-bold opacity-50 mb-1 uppercase" style="color: var(--accent-green);">Africana Document Engine</div>
                        <p class="text-xs">I have organized your professional text data structure. Would you like to compile this into a formatted, print-ready PDF portfolio file?</p>
                        <button id="pdfExportBtn" class="mt-2 text-xs font-bold text-white px-3 py-1.5 rounded" style="background: var(--accent-green); border:none; cursor:pointer;">
                            📄 Export Document as Official PDF
                        </button>
                    `;
                    chatLog.appendChild(exportCard);
                    scrollToBottom();

                    exportCard.querySelector('#pdfExportBtn').onclick = async () => {
                        exportCard.querySelector('#pdfExportBtn').innerText = "⏳ Packaging Document...";
                        try {
                            const res = await fetch("{% url 'users:generate_document_pdf' %}", {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'X-CSRFToken': CSRF_TOKEN
                                },
                                body: JSON.stringify({ text: data.text, doc_type: docType })
                            });
                            const exportData = await res.json();
                            if (res.ok && exportData.redirect_url) {
                                window.open(exportData.redirect_url, '_blank');
                                exportCard.querySelector('#pdfExportBtn').innerText = "✅ Export Completed";
                            } else {
                                alert("Export issue: " + (exportData.error || 'Unknown export failure.'));
                            }
                        } catch (err) {
                            console.error(err);
                            alert("Document processing endpoint failed to engage.");
                        }
                    };
                }, (data.text.length * 16) + 500);
            }
        } catch (e) {
            console.error(e);
            appendMessage('ai', "System Error: Connection failed.");
        } finally {
            chatInput.disabled = false;
            const sendButton = document.querySelector('.btn-send');
            if (sendButton) sendButton.disabled = false;
            chatInput.focus();
        }
    }

    function escapeHtml(text) {
        return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function linkify(text) {
        const markdownLinks = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
        return markdownLinks.replace(/(^|[^"'>])(https?:\/\/[^\s<]+)/gi, (match, prefix, url) => {
            return `${prefix}<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
        }).replace(/(^|[^"'>])((?:www\.)[^\s<]+)/gi, (match, prefix, url) => {
            return `${prefix}<a href="https://${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
        });
    }

    function formatMessageText(text) {
        if (!text) return '';
        const trimmed = text.trim();
        if (window.marked && typeof window.marked.parse === 'function') {
            return marked.parse(trimmed);
        }
        return linkify(escapeHtml(trimmed)).replace(/\n/g, '<br>');
    }

    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = `chat-message ${role}`;
        const formattedText = formatMessageText(text);
        const labelColor = role === 'user' ? '#e9edef' : 'var(--accent-green)';
        div.innerHTML = `<div class="text-[10px] font-bold opacity-50 mb-1 uppercase" style="color: ${labelColor};">${role === 'user' ? 'You' : 'Africana'}</div>${formattedText}`;
        chatLog.appendChild(div);
        
        requestAnimationFrame(() => {
            scrollToBottom();
        });
    }

    function appendTypingMessage(role, text) {
        const div = document.createElement('div');
        div.className = `chat-message ${role}`;
        const labelColor = role === 'user' ? '#e9edef' : 'var(--accent-green)';
        const placeholder = `<div class="text-[10px] font-bold opacity-50 mb-1 uppercase" style="color: ${labelColor};">${role === 'user' ? 'You' : 'Africana'}</div><div class="message-content" style="min-height: 1.2rem; opacity: 0.75;">&nbsp;</div>`;
        div.innerHTML = placeholder;
        chatLog.appendChild(div);

        const contentDiv = div.querySelector('.message-content');
        let index = 0;
        const speed = 15;
        const chunkSize = 10;

        const typeNextChunk = () => {
            index += chunkSize;
            if (index < text.length) {
                contentDiv.innerHTML = formatMessageText(text.slice(0, index));
            } else {
                contentDiv.innerHTML = formatMessageText(text);
            }
            scrollToBottom();
            if (index < text.length) {
                setTimeout(typeNextChunk, speed);
            }
        };

        setTimeout(typeNextChunk, speed);
    }

    function scrollToBottom() {
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    function getSessionHistory(id) {
        try {
            return JSON.parse(localStorage.getItem('chat_sessions') || '{}')[id] || [];
        } catch (err) {
            return [];
        }
    }

    function saveMessage(id, role, text) {
        let sessions = {};
        try {
            sessions = JSON.parse(localStorage.getItem('chat_sessions') || '{}');
        } catch (err) {
            sessions = {};
        }
        if (!sessions[id]) sessions[id] = [];
        sessions[id].push({ role, text });
        localStorage.setItem('chat_sessions', JSON.stringify(sessions));
    }

    function updateHistorySidebar() {
        let sessions = {};
        try {
            sessions = JSON.parse(localStorage.getItem('chat_sessions') || '{}');
        } catch (err) {
            sessions = {};
        }
        const container = document.getElementById('historyList');
        container.innerHTML = '';
        Object.keys(sessions).reverse().forEach(id => {
            const item = document.createElement('div');
            item.className = `history-item ${id === currentSessionId ? 'active' : ''}`;
            item.innerText = sessions[id][0]?.text || "New Chat";
            item.onclick = () => {
                switchSession(id);
                overlay.click();
            };
            container.appendChild(item);
        });
    }

    function switchSession(id) {
        currentSessionId = id;
        localStorage.setItem('lastSessionId', id);
        chatLog.innerHTML = '';
        const history = getSessionHistory(id);
        if (history.length === 0) {
            appendMessage('ai', WELCOME_MESSAGE);
            saveMessage(id, 'ai', WELCOME_MESSAGE);
        } else {
            history.forEach(m => appendMessage(m.role, m.text));
        }
        updateHistorySidebar();
        scrollToBottom();
    }

    function createNewChat() {
        const newSessionId = 'sess_' + Date.now();
        switchSession(newSessionId);
    }

    function clearChat() {
        if(confirm("Erase all history?")) {
            localStorage.removeItem('chat_sessions');
            localStorage.removeItem('lastSessionId');
            location.reload();
        }
    }
</script>
{% endblock %}
