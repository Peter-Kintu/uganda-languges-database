{% extends "base.html" %}

{% block title %}Africana AI - Career Companion{% endblock %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-main: #020617;
        --bg-sidebar: #0f172a;
        --accent-blue: #3b82f6;
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --glass-border: rgba(255, 255, 255, 0.1);
    }

    body {
        background-color: var(--bg-main);
        font-family: 'Plus Jakarta Sans', sans-serif;
        color: var(--text-primary);
        margin: 0;
        /* Force body to exactly the height of the viewport */
        height: 100dvh; 
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    .app-container {
        display: flex;
        flex: 1; 
        width: 100vw;
        position: relative;
        overflow: hidden; 
    }

    .sidebar {
        width: 280px;
        background: var(--bg-sidebar);
        border-right: 1px solid var(--glass-border);
        display: flex;
        flex-direction: column;
        transition: transform 0.3s ease;
        z-index: 100;
    }

    .chat-main-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: radial-gradient(circle at top right, #0f172a, #020617);
        /* Critical: ensures main area doesn't exceed parent height */
        height: 100%; 
        min-height: 0;
        position: relative;
    }

    .chat-header {
        flex-shrink: 0;
        padding: 0.75rem 1rem;
        background: rgba(2, 6, 23, 0.8);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--glass-border);
        z-index: 10;
    }

    /* Fixed Scrolling Logic */
    #chatLog {
        flex: 1 1 0%; /* Shorthand for grow, shrink, and basis 0 */
        overflow-y: auto;
        overflow-x: hidden;
        padding: 1.5rem 1rem;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        scroll-behavior: smooth;
        /* Hack to ensure Chrome/Safari respects overflow in flex */
        min-height: 0; 
    }

    #chatLog::-webkit-scrollbar { width: 6px; }
    #chatLog::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

    .chat-message {
        max-width: 85%;
        padding: 0.85rem 1.1rem;
        border-radius: 1.25rem;
        font-size: 0.95rem;
        line-height: 1.5;
        animation: fadeIn 0.2s ease;
        word-wrap: break-word;
        position: relative;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    .chat-message.user {
        align-self: flex-end;
        background: var(--accent-blue);
        color: white;
        border-bottom-right-radius: 4px;
    }

    .chat-message.ai {
        align-self: flex-start;
        background: #1e293b;
        border: 1px solid var(--glass-border);
        border-bottom-left-radius: 4px;
    }

    .chat-input-area {
        flex-shrink: 0;
        padding: 1rem;
        background: var(--bg-main);
        border-top: 1px solid var(--glass-border);
    }

    .input-glass-wrapper {
        display: flex;
        align-items: flex-end;
        background: rgba(30, 41, 59, 0.5);
        border: 1px solid var(--glass-border);
        border-radius: 1.25rem;
        padding: 0.5rem 0.75rem;
        max-width: 800px;
        margin: 0 auto;
    }

    textarea {
        flex: 1;
        background: transparent;
        border: none;
        color: white;
        outline: none;
        resize: none;
        padding: 0.5rem;
        font-size: 1rem;
        max-height: 150px;
        font-family: inherit;
    }

    .btn-send {
        background: var(--accent-blue);
        color: white;
        border: none;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: transform 0.1s;
        margin-bottom: 2px;
        flex-shrink: 0;
    }

    @media (max-width: 768px) {
        .sidebar {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            transform: translateX(-100%);
        }
        .sidebar.active { transform: translateX(0); }
        .chat-message { max-width: 92%; }
    }

    .history-item {
        padding: 0.75rem 1rem;
        margin: 0.25rem 0.75rem;
        border-radius: 0.75rem;
        cursor: pointer;
        font-size: 0.85rem;
        color: var(--text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .history-item.active {
        background: rgba(59, 130, 246, 0.15);
        color: white;
        font-weight: 600;
    }

    .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 90;
        backdrop-filter: blur(2px);
    }
    .sidebar-overlay.active { display: block; }
</style>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="p-5 flex justify-between items-center">
            <h2 class="text-xs font-bold uppercase text-slate-500 tracking-widest">History</h2>
            <button onclick="createNewChat()" class="text-slate-400 p-1 hover:text-white">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            </button>
        </div>
        <div id="historyList" class="flex-1 overflow-y-auto"></div>
        <div class="p-4 border-t border-white/5">
            <button onclick="clearChat()" class="text-[10px] text-red-400 uppercase font-bold w-full opacity-60 hover:opacity-100">Reset System</button>
        </div>
    </aside>

    <main class="chat-main-area">
        <header class="chat-header flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button id="sidebarToggle" class="p-1 text-slate-400">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <span class="font-bold text-sm tracking-tight">Africana AI <span class="text-blue-500">Companion</span></span>
            </div>
            <div class="flex items-center gap-2 px-2 py-1 bg-emerald-500/10 rounded border border-emerald-500/20">
                <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></div>
                <span class="text-[8px] font-black text-emerald-500 uppercase">Live</span>
            </div>
        </header>

        <div id="chatLog"></div>

        <div class="chat-input-area">
            <div class="input-glass-wrapper">
                <textarea id="chatInput" placeholder="Message your career AI..." rows="1"></textarea>
                <button onclick="typeQuery()" id="sendChatButton" class="btn-send">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
            </div>
        </div>
    </main>
</div>

<script>
    let currentSessionId = localStorage.getItem('lastSessionId') || 'sess_' + Date.now();
    const chatInput = document.getElementById('chatInput');
    const chatLog = document.getElementById('chatLog');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');

    document.getElementById('sidebarToggle').onclick = () => {
        sidebar.classList.add('active');
        overlay.classList.add('active');
    };

    overlay.onclick = () => {
        sidebar.classList.remove('active');
        overlay.classList.remove('active');
    };

    chatInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 150) + 'px';
    });

    window.onload = () => {
        switchSession(currentSessionId);
        updateHistorySidebar();
    };

    async function typeQuery() {
        const text = chatInput.value.trim();
        if (!text) return;

        appendMessage('user', text);
        chatInput.value = '';
        chatInput.style.height = 'auto';
        scrollToBottom();

        try {
            const response = await fetch("{% url 'users:gemini_proxy' %}", {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify({ 
                    contents: [...getSessionHistory(currentSessionId), { role: 'user', text: text }] 
                })
            });

            const data = await response.json();
            if (data.text) {
                appendMessage('ai', data.text);
                saveMessage(currentSessionId, 'user', text);
                saveMessage(currentSessionId, 'ai', data.text);
                updateHistorySidebar();
            }
        } catch (e) {
            appendMessage('ai', "System Error: Connection failed.");
        }
    }

    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = `chat-message ${role}`;
        let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
        div.innerHTML = `<div class="text-[10px] font-bold opacity-30 mb-1 uppercase">${role === 'user' ? 'You' : 'Africana'}</div>${formattedText}`;
        chatLog.appendChild(div);
        
        // Wait for DOM update before scrolling
        requestAnimationFrame(() => {
            scrollToBottom();
        });
    }

    function scrollToBottom() {
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    function getSessionHistory(id) {
        return JSON.parse(localStorage.getItem('chat_sessions') || '{}')[id] || [];
    }

    function saveMessage(id, role, text) {
        const sessions = JSON.parse(localStorage.getItem('chat_sessions') || '{}');
        if (!sessions[id]) sessions[id] = [];
        sessions[id].push({ role, text });
        localStorage.setItem('chat_sessions', JSON.stringify(sessions));
    }

    function updateHistorySidebar() {
        const sessions = JSON.parse(localStorage.getItem('chat_sessions') || '{}');
        const container = document.getElementById('historyList');
        container.innerHTML = '';
        Object.keys(sessions).reverse().forEach(id => {
            const item = document.createElement('div');
            item.className = `history-item ${id === currentSessionId ? 'active' : ''}`;
            item.innerText = sessions[id][0]?.text || "New Chat";
            item.onclick = () => {
                switchSession(id);
                overlay.click();
            };
            container.appendChild(item);
        });
    }

    function switchSession(id) {
        currentSessionId = id;
        localStorage.setItem('lastSessionId', id);
        chatLog.innerHTML = '';
        const history = getSessionHistory(id);
        if (history.length === 0) {
            appendMessage('ai', "Hello! How can I assist with your career goals today?");
        } else {
            history.forEach(m => appendMessage(m.role, m.text));
        }
        updateHistorySidebar();
        scrollToBottom();
    }

    function createNewChat() {
        switchSession('sess_' + Date.now());
    }

    function clearChat() {
        if(confirm("Erase all history?")) {
            localStorage.clear();
            location.reload();
        }
    }

    chatInput.onkeydown = (e) => {
        if(e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            typeQuery();
        }
    };
</script>
{% endblock %}
