{% extends "base.html" %}

{% block title %}Africana AI - Career Companion{% endblock %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-main: #ffffff;
        --bg-sidebar: #f5f7fb;
        --accent-green: #16a34a;
        --accent-green-dark: #15803d;
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --glass-border: rgba(15, 23, 42, 0.08);
        --user-bg: #d1fae5;
        --ai-bg: #e2e8f0;
    }

    /* Prevent base.html from creating a double scrollbar */
    html, body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        background-color: var(--bg-main);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        color: var(--text-primary);
    }

    /* The container must account for the header in base.html.
       Subtracting 80px is a standard estimate for the header height.
    */
    .app-container {
        display: flex;
        width: 100vw;
        height: calc(100vh - 80px); 
        position: relative;
        overflow: hidden; 
    }

    @media (max-width: 768px) {
        .app-container {
            height: calc(100vh - 140px); /* Adjust for mobile bottom nav in base.html */
        }
    }

    @media (max-width: 480px) {
        .app-container {
            height: calc(100vh - 160px); /* Extra adjustment for very small screens */
        }
    }

    .sidebar {
        width: 280px;
        background: var(--bg-sidebar);
        border-right: 1px solid var(--glass-border);
        display: flex;
        flex-direction: column;
        transition: transform 0.3s ease;
        z-index: 100;
        height: 100%;
    }

    .chat-main-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: var(--bg-main);
        height: 100%;
        min-height: 0;
        position: relative;
    }

    .chat-header {
        flex-shrink: 0;
        padding: 0.75rem 1rem;
        background: var(--bg-sidebar);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--glass-border);
        z-index: 10;
    }

    #chatLog {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 1.5rem 1rem;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        scroll-behavior: smooth;
        min-height: 0;
        background: #ffffff;
        border-radius: 1.5rem;
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
    }

    #chatLog::-webkit-scrollbar { width: 6px; }
    #chatLog::-webkit-scrollbar-track { background: transparent; }
    #chatLog::-webkit-scrollbar-thumb { background: var(--accent-green); border-radius: 3px; opacity: 0.5; }

    .chat-message {
        max-width: 85%;
        padding: 0.85rem 1.1rem;
        border-radius: 1.25rem;
        font-size: 0.95rem;
        line-height: 1.5;
        animation: fadeIn 0.2s ease;
        word-wrap: break-word;
        position: relative;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    .chat-message.user {
        align-self: flex-end;
        background: var(--user-bg);
        color: var(--text-primary);
        border-bottom-right-radius: 4px;
    }

    .chat-message.ai {
        align-self: flex-start;
        background: var(--ai-bg);
        color: var(--text-primary);
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-bottom-left-radius: 4px;
    }

    .chat-input-area {
        flex-shrink: 0;
        padding: 1rem;
        background: var(--bg-main);
        border-top: 1px solid var(--glass-border);
    }

    .input-glass-wrapper {
        display: flex;
        align-items: flex-end;
        background: rgba(30, 42, 47, 0.8);
        border: 1px solid var(--glass-border);
        border-radius: 1.25rem;
        padding: 0.5rem 0.75rem;
        max-width: 800px;
        margin: 0 auto;
    }

    textarea {
        flex: 1;
        background: transparent;
        border: none;
        color: white;
        outline: none;
        resize: none;
        padding: 0.5rem;
        font-size: 1rem;
        max-height: 150px;
        font-family: inherit;
    }

    textarea:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .btn-send {
        background: var(--accent-green);
        color: white;
        border: none;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
        margin-bottom: 2px;
        flex-shrink: 0;
    }

    .btn-send:hover {
        background: var(--accent-green-dark);
        transform: scale(1.05);
    }

    .btn-send:active {
        transform: scale(0.95);
    }

    .btn-send:disabled {
        background: #6b7280;
        cursor: not-allowed;
        transform: none;
    }

    @media (max-width: 768px) {
        .sidebar {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            transform: translateX(-100%);
        }
        .sidebar.active { transform: translateX(0); }
        .chat-message { max-width: 92%; }
        .chat-header {
            padding: 0.5rem 0.75rem;
        }
        .chat-input-area {
            padding: 0.75rem;
        }
        .input-glass-wrapper {
            padding: 0.4rem 0.6rem;
        }
        textarea {
            font-size: 0.9rem;
            padding: 0.4rem;
        }
        .btn-send {
            width: 32px;
            height: 32px;
        }
        .btn-send svg {
            width: 16px;
            height: 16px;
        }
    }

    /* Extra small screens */
    @media (max-width: 480px) {
        .sidebar {
            width: 260px;
        }
        .chat-message {
            max-width: 95%;
            font-size: 0.9rem;
            padding: 0.7rem 0.9rem;
        }
        .chat-header {
            padding: 0.4rem 0.6rem;
        }
        .chat-header span {
            font-size: 0.85rem;
        }
        .chat-input-area {
            padding: 0.6rem;
        }
        .input-glass-wrapper {
            padding: 0.3rem 0.5rem;
        }
        textarea {
            font-size: 0.85rem;
            padding: 0.3rem;
        }
        .btn-send {
            width: 28px;
            height: 28px;
        }
        .btn-send svg {
            width: 14px;
            height: 14px;
        }
        #chatLog {
            padding: 1rem 0.75rem;
            gap: 1rem;
        }
        .history-item {
            padding: 0.6rem 0.8rem;
            margin: 0.2rem 0.5rem;
            font-size: 0.8rem;
        }
    }

    /* Large screens */
    @media (min-width: 1024px) {
        .sidebar {
            width: 320px;
        }
        .chat-main-area {
            max-width: 1200px;
            margin: 0 auto;
        }
        .chat-message {
            max-width: 75%;
        }
        .input-glass-wrapper {
            max-width: 900px;
        }
    }

    /* Medium screens */
    @media (min-width: 768px) and (max-width: 1023px) {
        .sidebar {
            width: 280px;
        }
        .chat-message {
            max-width: 80%;
        }
    }

    .history-item {
        padding: 0.75rem 1rem;
        margin: 0.25rem 0.75rem;
        border-radius: 0.75rem;
        cursor: pointer;
        font-size: 0.85rem;
        color: var(--text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        transition: all 0.2s;
    }

    .history-item:hover {
        background: rgba(37, 211, 102, 0.1);
    }

    .history-item.active {
        background: rgba(37, 211, 102, 0.2);
        color: var(--accent-green);
        font-weight: 600;
    }

    .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        z-index: 90;
        backdrop-filter: blur(2px);
    }
    .sidebar-overlay.active { display: block; }

    /* Hide the default site footer for this specific interface */
    footer { display: none !important; }
</style>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="p-5 flex justify-between items-center">
            <h2 class="text-xs font-bold uppercase text-slate-500 tracking-widest">History</h2>
            <button onclick="createNewChat()" class="text-slate-400 p-1 hover:text-white">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            </button>
        </div>
        <div id="historyList" class="flex-1 overflow-y-auto"></div>
        <div class="p-4 border-t border-white/5">
            <button onclick="clearChat()" class="text-[10px] text-red-400 uppercase font-bold w-full opacity-60 hover:opacity-100">Reset System</button>
        </div>
    </aside>

    <main class="chat-main-area">
        <header class="chat-header flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button id="sidebarToggle" class="p-1 text-slate-400">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <span class="font-bold text-sm tracking-tight">Africana AI <span style="color: var(--accent-green);">Companion</span></span>
            </div>
            <div class="flex items-center gap-2 px-2 py-1 rounded border" style="background: rgba(37, 211, 102, 0.1); border-color: var(--accent-green);">
                <div class="w-1.5 h-1.5 rounded-full animate-pulse" style="background: var(--accent-green);"></div>
                <span class="text-[8px] font-black uppercase" style="color: var(--accent-green);">Live</span>
            </div>
        </header>

        <div id="chatLog"></div>

        <div class="chat-input-area">
            <div class="input-glass-wrapper">
                <textarea id="chatInput" placeholder="Message your career AI..." rows="1"></textarea>
                <button onclick="typeQuery()" id="sendChatButton" class="btn-send">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
            </div>
        </div>
    </main>
</div>

<script>
    let currentSessionId = localStorage.getItem('lastSessionId') || 'sess_' + Date.now();
    const chatInput = document.getElementById('chatInput');
    const chatLog = document.getElementById('chatLog');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const WELCOME_MESSAGE = "Hello! How can I assist with your career goals today?";
    const CSRF_TOKEN = getCookie('csrftoken');

    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return '';
    }

    document.getElementById('sidebarToggle').onclick = () => {
        sidebar.classList.add('active');
        overlay.classList.add('active');
    };

    overlay.onclick = () => {
        sidebar.classList.remove('active');
        overlay.classList.remove('active');
    };

    chatInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 150) + 'px';
    });

    window.onload = () => {
        switchSession(currentSessionId);
        updateHistorySidebar();
    };

    async function typeQuery() {
        const text = chatInput.value.trim();
        if (!text) return;

        // Check client-side cache first
        const cacheKey = `ai_cache_${text.toLowerCase().replace(/\s+/g, '_')}`;
        const cachedResponse = localStorage.getItem(cacheKey);
        if (cachedResponse) {
            appendMessage('user', text);
            chatInput.value = '';
            chatInput.style.height = 'auto';
            scrollToBottom();
            appendMessage('ai', cachedResponse);
            saveMessage(currentSessionId, 'user', text);
            saveMessage(currentSessionId, 'ai', cachedResponse);
            updateHistorySidebar();
            return;
        }

        // Disable input and button to prevent spamming
        chatInput.disabled = true;
        const sendButton = document.querySelector('.btn-send');
        if (sendButton) sendButton.disabled = true;

        appendMessage('user', text);
        chatInput.value = '';
        chatInput.style.height = 'auto';
        scrollToBottom();

        try {
            let response = await fetch("{% url 'users:cerebras_proxy' %}", {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': CSRF_TOKEN
                },
                body: JSON.stringify({ 
                    contents: [...getSessionHistory(currentSessionId), { role: 'user', text: text }] 
                })
            });

            // Fallback to Gemini if Cerebras fails with rate limit or service unavailable
            if (!response.ok && (response.status === 429 || response.status === 503)) {
                console.log('Cerebras rate limited, trying Gemini fallback...');
                response = await fetch("{% url 'users:gemini_proxy' %}", {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-CSRFToken': CSRF_TOKEN
                    },
                    body: JSON.stringify({ 
                        contents: [...getSessionHistory(currentSessionId), { role: 'user', text: text }] 
                    })
                });
            }

            const data = await response.json();
            if (!response.ok) {
                const errorMessage = data.error || `Server error (${response.status})`;
                appendMessage('ai', errorMessage);
                saveMessage(currentSessionId, 'user', text);
                saveMessage(currentSessionId, 'ai', errorMessage);
                updateHistorySidebar();
                return;
            }

            if (data.text) {
                appendMessage('ai', data.text);
                saveMessage(currentSessionId, 'user', text);
                saveMessage(currentSessionId, 'ai', data.text);
                updateHistorySidebar();
                // Cache the response
                localStorage.setItem(cacheKey, data.text);
            } else {
                const errorMessage = data.error || "No response from Africana AI.";
                appendMessage('ai', errorMessage);
                saveMessage(currentSessionId, 'user', text);
                saveMessage(currentSessionId, 'ai', errorMessage);
                updateHistorySidebar();
            }
        } catch (e) {
            console.error(e);
            appendMessage('ai', "System Error: Connection failed.");
        } finally {
            // Re-enable input and button
            chatInput.disabled = false;
            const sendButton = document.querySelector('.btn-send');
            if (sendButton) sendButton.disabled = false;
            chatInput.focus();
        }
    }

    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = `chat-message ${role}`;
        let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
        const labelColor = role === 'user' ? '#e9edef' : 'var(--accent-green)';
        div.innerHTML = `<div class="text-[10px] font-bold opacity-50 mb-1 uppercase" style="color: ${labelColor};">${role === 'user' ? 'You' : 'Africana'}</div>${formattedText}`;
        chatLog.appendChild(div);
        
        requestAnimationFrame(() => {
            scrollToBottom();
        });
    }

    function scrollToBottom() {
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    function getSessionHistory(id) {
        try {
            return JSON.parse(localStorage.getItem('chat_sessions') || '{}')[id] || [];
        } catch (err) {
            return [];
        }
    }

    function saveMessage(id, role, text) {
        let sessions = {};
        try {
            sessions = JSON.parse(localStorage.getItem('chat_sessions') || '{}');
        } catch (err) {
            sessions = {};
        }
        if (!sessions[id]) sessions[id] = [];
        sessions[id].push({ role, text });
        localStorage.setItem('chat_sessions', JSON.stringify(sessions));
    }

    function updateHistorySidebar() {
        let sessions = {};
        try {
            sessions = JSON.parse(localStorage.getItem('chat_sessions') || '{}');
        } catch (err) {
            sessions = {};
        }
        const container = document.getElementById('historyList');
        container.innerHTML = '';
        Object.keys(sessions).reverse().forEach(id => {
            const item = document.createElement('div');
            item.className = `history-item ${id === currentSessionId ? 'active' : ''}`;
            item.innerText = sessions[id][0]?.text || "New Chat";
            item.onclick = () => {
                switchSession(id);
                overlay.click();
            };
            container.appendChild(item);
        });
    }

    function switchSession(id) {
        currentSessionId = id;
        localStorage.setItem('lastSessionId', id);
        chatLog.innerHTML = '';
        const history = getSessionHistory(id);
        if (history.length === 0) {
            appendMessage('ai', WELCOME_MESSAGE);
            saveMessage(id, 'ai', WELCOME_MESSAGE);
        } else {
            history.forEach(m => appendMessage(m.role, m.text));
        }
        updateHistorySidebar();
        scrollToBottom();
    }

    function createNewChat() {
        const newSessionId = 'sess_' + Date.now();
        switchSession(newSessionId);
    }

    function clearChat() {
        if(confirm("Erase all history?")) {
            localStorage.removeItem('chat_sessions');
            localStorage.removeItem('lastSessionId');
            location.reload();
        }
    }

    chatInput.onkeydown = (e) => {
        if(e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            typeQuery();
        }
    };
</script>
{% endblock %}
