{% extends "base.html" %}

{% block title %}Africana AI - Career Companion{% endblock %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    /* --- MODERN DARK NEON THEME --- */
    :root {
        --bg-main: #020617;
        --bg-sidebar: #0f172a;
        --accent-blue: #3b82f6;
        --accent-glow: rgba(59, 130, 246, 0.5);
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --glass-border: rgba(255, 255, 255, 0.05);
    }

    body {
        background-color: var(--bg-main);
        font-family: 'Plus Jakarta Sans', sans-serif;
        color: var(--text-primary);
        margin: 0;
        height: 100vh;
        overflow: hidden;
    }

    /* --- CUSTOM MODERN SCROLLBAR --- */
    ::-webkit-scrollbar {
        width: 5px;
    }
    ::-webkit-scrollbar-track {
        background: transparent;
    }
    ::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
        background: var(--accent-blue);
    }

    .app-container {
        display: flex;
        height: 100vh;
        max-width: 100vw;
    }

    /* --- SIDEBAR REDESIGN --- */
    .sidebar {
        width: 280px;
        background: var(--bg-sidebar);
        border-right: 1px solid var(--glass-border);
        display: flex;
        flex-direction: column;
        transition: transform 0.3s ease, width 0.3s ease;
    }

    .sidebar.collapsed { width: 0; overflow: hidden; }

    .sidebar-header {
        padding: 2rem 1.5rem 1rem;
    }

    .sidebar-header h2 {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-secondary);
        font-weight: 700;
    }

    .history-list {
        flex: 1;
        overflow-y: auto;
        padding: 0.75rem;
        list-style: none;
    }

    .history-item {
        padding: 0.85rem 1rem;
        margin-bottom: 0.4rem;
        border-radius: 12px;
        color: var(--text-secondary);
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        font-size: 0.85rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        border: 1px solid transparent;
    }

    .history-item:hover {
        background: rgba(255, 255, 255, 0.03);
        color: var(--text-primary);
    }

    .history-item.active {
        background: rgba(59, 130, 246, 0.1);
        color: var(--accent-blue);
        border-color: rgba(59, 130, 246, 0.2);
    }

    /* --- CHAT AREA REDESIGN --- */
    .chat-main-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: radial-gradient(circle at top right, #0f172a, #020617);
    }

    .chat-header-main {
        padding: 1rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(2, 6, 23, 0.8);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--glass-border);
        z-index: 10;
    }

    .chat-header-main h1 {
        font-size: 1.1rem;
        font-weight: 600;
        background: linear-gradient(to right, #fff, #94a3b8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    #chatLog {
        flex: 1;
        overflow-y: auto;
        padding: 2rem 15% 4rem; /* Centered content for better readability */
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        scroll-behavior: smooth;
    }

    .chat-message {
        max-width: 85%;
        padding: 1.25rem;
        border-radius: 18px;
        font-size: 0.95rem;
        line-height: 1.6;
        position: relative;
    }

    .chat-message.user {
        align-self: flex-end;
        background: var(--accent-blue);
        color: white;
        border-bottom-right-radius: 4px;
        box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.2);
    }

    .chat-message.ai {
        align-self: flex-start;
        background: #1e293b;
        color: #e2e8f0;
        border-bottom-left-radius: 4px;
        border: 1px solid var(--glass-border);
    }

    .message-label {
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.5rem;
        font-weight: 800;
        opacity: 0.5;
    }

    /* --- INPUT AREA REDESIGN --- */
    .chat-input-area {
        padding: 1.5rem 15%;
        background: linear-gradient(to top, var(--bg-main), transparent);
    }

    .input-container {
        display: flex;
        align-items: center;
        background: #0f172a;
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        padding: 0.75rem 1rem;
        transition: border 0.3s ease, box-shadow 0.3s ease;
    }

    .input-container:focus-within {
        border-color: var(--accent-blue);
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
    }

    #chatInput {
        flex: 1;
        background: transparent;
        border: none;
        color: white;
        padding: 0.5rem;
        outline: none;
        font-family: inherit;
        font-size: 0.95rem;
        max-height: 200px;
    }

    #sendChatButton {
        background: var(--accent-blue);
        color: white;
        width: 40px;
        height: 40px;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s ease;
    }

    #sendChatButton:hover { transform: scale(1.05); }

    /* --- RESPONSIVE MOBILE --- */
    @media (max-width: 1024px) {
        #chatLog, .chat-input-area { padding-left: 5%; padding-right: 5%; }
    }

    @media (max-width: 768px) {
        .sidebar { position: fixed; left: -280px; z-index: 100; height: 100%; }
        .sidebar.open { left: 0; }
    }
</style>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="flex justify-between items-center">
                <h2>Recent Chats</h2>
                <button onclick="createNewChat()" class="text-gray-400 hover:text-white">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                </button>
            </div>
        </div>
        <ul class="history-list" id="historyList"></ul>
        <div class="p-4 border-t border-gray-800">
            <button onclick="clearChat()" class="w-full py-2 text-xs text-red-400 hover:bg-red-500/10 rounded-lg transition">
                Clear All Conversations
            </button>
        </div>
    </aside>

    <main class="chat-main-area">
        <header class="chat-header-main">
            <div class="flex items-center gap-3">
                <button id="sidebarToggle" class="text-gray-400">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <h1>Africana Career AI</h1>
            </div>
            <div class="px-3 py-1 bg-blue-500/10 text-blue-400 text-[10px] font-bold rounded-full border border-blue-500/20 uppercase tracking-widest">
                v2.0 Flash
            </div>
        </header>

        <div id="chatLog"></div>

        <div class="chat-input-area">
            <div class="input-container">
                <textarea id="chatInput" placeholder="Ask about jobs, CVs, or career paths..." rows="1"></textarea>
                <button onclick="typeQuery()" id="sendChatButton">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
            <div id="loadingIndicator" class="hidden text-center mt-4">
                <div class="inline-flex items-center gap-2 text-blue-400 text-[10px] font-bold uppercase tracking-tighter">
                    <span class="w-1 h-1 bg-blue-400 rounded-full animate-ping"></span>
                    AI Processing...
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    let currentSessionId = localStorage.getItem('lastSessionId') || 'session_' + Date.now();
    const chatInput = document.getElementById('chatInput');
    const chatLog = document.getElementById('chatLog');
    const loadingIndicator = document.getElementById('loadingIndicator');

    window.onload = () => {
        updateHistorySidebar();
        switchSession(currentSessionId);
        chatInput.focus();
    };

    async function typeQuery() {
        const text = chatInput.value.trim();
        if (!text) return;

        const sendButton = document.getElementById('sendChatButton');
        sendButton.disabled = true;

        appendMessage('user', text);
        chatInput.value = '';
        chatInput.style.height = 'auto';
        loadingIndicator.classList.remove('hidden');
        
        try {
            const history = getSessionHistory(currentSessionId);
            const response = await fetch("{% url 'users:gemini_proxy' %}", {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify({ contents: history.concat({ role: 'user', text: text }) })
            });

            const data = await response.json();

            if (data.text) {
                appendMessage('ai', data.text);
                saveMessage(currentSessionId, 'user', text);
                saveMessage(currentSessionId, 'ai', data.text);
                updateHistorySidebar();
            }
        } catch (e) {
            appendMessage('error', "Connection issue. Please try again.");
        } finally {
            loadingIndicator.classList.add('hidden');
            sendButton.disabled = false;
            chatLog.scrollTop = chatLog.scrollHeight;
        }
    }

    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = `chat-message ${role}`;
        let label = role === 'ai' ? 'Career Agent' : 'You';

        let formattedText = text
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\n/g, '<br>');

        div.innerHTML = `<div class="message-label">${label}</div><div>${formattedText}</div>`;
        chatLog.appendChild(div);
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    function getSessionHistory(id) {
        const sessions = JSON.parse(localStorage.getItem('chat_sessions') || '{}');
        return sessions[id] || [];
    }

    function saveMessage(id, role, text) {
        if (role === 'error') return;
        const sessions = JSON.parse(localStorage.getItem('chat_sessions') || '{}');
        if (!sessions[id]) sessions[id] = [];
        sessions[id].push({ role, text });
        localStorage.setItem('chat_sessions', JSON.stringify(sessions));
    }

    function updateHistorySidebar() {
        const sessions = JSON.parse(localStorage.getItem('chat_sessions') || '{}');
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        
        Object.keys(sessions).sort().reverse().forEach(id => {
            const firstMsg = sessions[id][0]?.text || "New Session";
            const li = document.createElement('li');
            li.className = `history-item ${id === currentSessionId ? 'active' : ''}`;
            li.innerHTML = `<span>${firstMsg}</span>`;
            li.onclick = () => switchSession(id);
            list.appendChild(li);
        });
    }

    function switchSession(id) {
        currentSessionId = id;
        localStorage.setItem('lastSessionId', id);
        chatLog.innerHTML = '';
        getSessionHistory(id).forEach(m => appendMessage(m.role, m.text));
        updateHistorySidebar();
    }

    function createNewChat() {
        const newId = 'session_' + Date.now();
        switchSession(newId);
    }

    function clearChat() {
        if (confirm("Clear all chat history?")) {
            localStorage.clear();
            location.reload();
        }
    }

    document.getElementById('sidebarToggle').onclick = () => {
        const sidebar = document.getElementById('sidebar');
        if (window.innerWidth <= 768) {
            sidebar.classList.toggle('open');
        } else {
            sidebar.classList.toggle('collapsed');
        }
    };

    chatInput.oninput = function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    };

    chatInput.onkeydown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            typeQuery();
        }
    };
</script>
{% endblock %}
